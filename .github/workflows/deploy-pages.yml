name: Deploy site to GitHub Pages

# Reliable replacement for the built-in "deploy from a branch" Pages build,
# which became unreliable for this repo. Publishes the frontend/ folder.
on:
  push:
    branches:
      - claude/qr-table-ordering-system-wd1as7
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload frontend as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
