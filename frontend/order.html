<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order · Vasco da Gama Taverna</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23e6a817'/%3E%3Ctext x='16' y='23' font-size='18' text-anchor='middle'%3E%E2%9A%93%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">
        <span class="crest">⚓</span>
        <span>
          <span class="brand-name">Vasco da Gama Taverna</span>
          <span class="brand-sub">The Portuguese Embassy · Since 1972</span>
        </span>
      </a>
      <div class="topbar-meta">
        <span class="pill" id="tablePill">Table —</span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <nav class="cat-nav" id="catNav"></nav>
    <div id="menu"></div>
    <p class="footer-note">
      Prices in ZAR · Menu from Vasco Menu 2024 · Please advise your waitron of any allergies.
    </p>
  </main>

  <!-- sticky cart bar -->
  <div class="cartbar" id="cartbar">
    <span><span class="count" id="cartCount">0</span>&nbsp; items in your order</span>
    <button class="btn btn-gold" id="openCart">View order · R<span id="cartbarTotal">0</span></button>
  </div>

  <!-- cart drawer -->
  <div class="drawer-backdrop" id="backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <h2>Your order · <span id="drawerTable">Table —</span></h2>
      <button class="drawer-close" id="closeCart">&times;</button>
    </div>
    <div class="drawer-body" id="cartItems"></div>
    <div class="drawer-foot">
      <div class="field">
        <label for="orderNote">Notes for the kitchen (optional)</label>
        <textarea id="orderNote" rows="2" placeholder="e.g. medium rare, no chilli, extra napkins"></textarea>
      </div>
      <div class="totals"><span>Total</span><span>R<span id="grandTotal">0</span></span></div>
      <button class="btn btn-gold" style="width:100%;" id="placeOrder">Place order &amp; pay</button>
      <p class="muted center" style="font-size:0.72rem;margin:8px 0 0;">
        Demo checkout — no real payment is taken.
      </p>
    </div>
  </aside>

  <div class="toast" id="toast"></div>

  <script src="assets/js/menu-data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/order.js"></script>
</body>
</html>
