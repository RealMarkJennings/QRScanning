<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manager · Vasco da Gama Taverna</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23e6a817'/%3E%3Ctext x='16' y='23' font-size='18' text-anchor='middle'%3E%E2%9A%93%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="assets/css/styles.css?v=5" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="index.html">
        <span class="crest">⚓</span>
        <span>
          <span class="brand-name">Vasco da Gama Taverna</span>
          <span class="brand-sub">Manager Dashboard</span>
        </span>
      </a>
      <div class="topbar-meta">
        <span id="syncStatus" style="font-size:0.72rem;margin-right:12px;"></span>
        <a class="btn btn-ghost btn-sm" style="color:var(--cream);border-color:rgba(247,241,227,.4)" href="index.html">Table QR codes</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div class="dash-head">
      <div>
        <h1 style="margin:6px 0 2px;">Live orders</h1>
        <p class="muted" style="margin:0;">Updates the moment a guest places an order.</p>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" id="seedBtn">+ Demo order</button>
        <button class="btn btn-ghost btn-sm" id="clearBtn">Clear all</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="orders">Orders <span id="openCountBadge" class="count" style="background:var(--gold);color:var(--navy);"></span></button>
      <button class="tab" data-tab="menu">Menu &amp; availability</button>
    </div>

    <section id="tab-orders">
      <div id="billsAlerts"></div>
      <div class="orders-grid" id="ordersGrid"></div>
      <div class="empty-state" id="ordersEmpty" hidden>
        <div class="big">🍽️</div>
        <p>No orders yet.<br>Open a table's menu, place an order, and it'll appear here live.</p>
      </div>
    </section>

    <section id="tab-menu" hidden>
      <p class="muted">Flip an item off to mark it <strong>sold out</strong> — it instantly greys out on the customer menu.</p>
      <div id="menuManage"></div>
    </section>
  </main>

  <script src="assets/js/config.js?v=5"></script>
  <script src="assets/js/menu-data.js?v=5"></script>
  <script src="assets/js/store.js?v=5"></script>
  <script src="assets/js/manager.js?v=5"></script>
</body>
</html>
